    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:#1a1d2e transparent}
        ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:10px}
        ::-webkit-scrollbar-thumb:hover{background:#3a3f52}
        body{background:#07080c;color:#e8eaed;font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
        .pulse-dot{animation:pulseDot 2s infinite}
        @keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
        @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
        @keyframes glowPulse{0%,100%{box-shadow:0 0 15px rgba(0,232,123,.1)}50%{box-shadow:0 0 30px rgba(0,232,123,.25)}}
        .slide-in{animation:slideIn .3s ease-out}
        .signal-buy{background:linear-gradient(135deg,rgba(0,232,123,.12),rgba(0,232,123,.03));border:1px solid rgba(0,232,123,.25)}
        .signal-sell{background:linear-gradient(135deg,rgba(255,45,85,.12),rgba(255,45,85,.03));border:1px solid rgba(255,45,85,.25)}
        .signal-hold{background:linear-gradient(135deg,rgba(58,63,82,.2),rgba(58,63,82,.05));border:1px solid rgba(58,63,82,.3)}
        .risk-bar{height:4px;border-radius:2px;background:#1a1d2e;overflow:hidden}
        .risk-fill{height:100%;border-radius:2px;transition:width .6s ease}
        .token-row{transition:all .15s ease;cursor:pointer;border-bottom:1px solid rgba(26,29,46,.5)}
        .token-row:hover{background:#111420}
        .token-row.active{background:#111420;border-left:2px solid #00e87b}
        .toast{animation:slideIn .3s ease-out;position:fixed;right:20px;z-index:9999}
        .bg-grid{background-image:linear-gradient(rgba(26,29,46,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(26,29,46,.3) 1px,transparent 1px);background-size:40px 40px}
        .metric-card{background:linear-gradient(135deg,#0d0f15 0%,#0a0b10 100%);border:1px solid #1a1d2e}
        select,input,textarea{background:#0d0f15;border:1px solid #1a1d2e;color:#e8eaed;border-radius:6px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
        select:focus,input:focus{border-color:#00e87b}
        .btn-buy{background:linear-gradient(135deg,#00e87b,#00c968);color:#07080c;font-weight:700;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
        .btn-buy:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,232,123,.3)}
        .btn-buy:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
        .btn-dry{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;font-weight:700;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
        .btn-dry:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.3)}
        .btn-dry:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
        .tp-level{position:relative;overflow:hidden}
        .tp-level::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px}
        .tp-level.tp1::before{background:#00e87b}
        .tp-level.tp2::before{background:#f0b90b}
        .tp-level.tp3::before{background:#6366f1}
        .tp-level.sl::before{background:#ff2d55}
        .entry-line{position:relative;overflow:hidden}
        .entry-line::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px;background:#00e87b;animation:glowPulse 2s infinite}
        .check-pass{color:#00e87b}.check-fail{color:#ff2d55}.check-warn{color:#f0b90b}
        .api-log-scroll{max-height:200px;overflow-y:auto}
        .detector-item{transition:all .2s}.detector-item:hover{background:rgba(255,255,255,.02)}
        
        /* Grid Lebar untuk Tabel Anti Berantakan (DIJAMIN RAPI) */
        .table-grid {
            display: grid;
            /* Kolom: # | Icon | Token Info | Price | 30m | Signal | RSI | MACD | Vol | Risk | Entry | TP1 | TP2 | TP3 | SL */
            grid-template-columns: 24px 28px 160px 85px 55px 75px 40px 50px 40px 65px 70px 70px 70px 70px 70px;
            gap: 8px;
            align-items: center;
            min-width: 1150px; /* Diberi ruang sangat lega */
        }
        .ca-btn { transition: all 0.2s; cursor: pointer; }
        .ca-btn:hover { color: #00e87b; }
        .link-icon { transition: all 0.2s; color: #6b7280; cursor: pointer; }
        .link-icon:hover { color: #e8eaed; transform: scale(1.1); }

    // =============================================
    // ROBUST API CALLER (Direct -> Proxy Fallback)
    // =============================================
    async function api(method, ep, body=null){
        apiCnt++;
        if(document.getElementById('sApi')) document.getElementById('sApi').textContent=apiCnt;
        
        const directUrl = `${CFG.baseUrl}${ep}`;
        const headers = {'Authorization':`Bearer ${CFG.apiKey}`,'Content-Type':'application/json','X-Dry-Run':'true'};
        const reqOpts = { method, headers };
        if(body) reqOpts.body = JSON.stringify(body);
        
        // 1. Coba koneksi langsung (Jika backend CORS sudah fix)
        try {
            const c = new AbortController(); const t = setTimeout(() => c.abort(), 5000);
            const res = await fetch(directUrl, { ...reqOpts, signal: c.signal });
            clearTimeout(t);
            if(res.ok) return await res.json();
        } catch(e) {
            // Gagal direct (biasanya karena CORS), lanjut ke proxy
        }

        // 2. Fallback via corsproxy.io
        try {
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(directUrl)}`;
            const c2 = new AbortController(); const t2 = setTimeout(() => c2.abort(), 8000);
            const res2 = await fetch(proxyUrl, { ...reqOpts, signal: c2.signal });
            clearTimeout(t2);
            if(res2.ok) return await res2.json();
        } catch (e2) {
            // Gagal di proxy juga, fallback diam-diam ke simulasi lokal (return null)
        }
        return null;
    }

    // TEKNIKAL & SECURITY ENGINE

    function genOHLCV(bp,vol,n){
        const c=[];let p=bp;
        for(let i=0;i<n;i++){const ch=(Math.random()-.48)*vol*p;const o=p,cl=p+ch;
        const h=Math.max(o,cl)+Math.random()*vol*p*.5,l=Math.min(o,cl)-Math.random()*vol*p*.5;
        const v=(Math.random()*500000+50000)*(1+Math.abs(ch/p)*10);
        c.push({open:o,high:h,low:l,close:cl,volume:v,time:Date.now()-(n-i)*30*60000});p=cl}return c;
    }
    function ema(d,p){const k=2/(p+1);let e=d[0];const r=[e];for(let i=1;i<d.length;i++){e=d[i]*k+e*(1-k);r.push(e)}return r}
    function rsi(c,p=14){if(c.length<p+1)return 50;let g=0,l=0;for(let i=c.length-p;i<c.length;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l-=d}const ag=g/p,al=l/p;if(al===0)return 100;return 100-(100/(1+ag/al))}
    function macd(c){if(c.length<26)return{m:0,s:0,h:0};const e12=ema(c,12),e26=ema(c,26);const ml=e12.map((v,i)=>v-e26[i]);const sl=ema(ml,9);const n=ml.length-1;return{m:ml[n],s:sl[n],h:ml[n]-sl[n]}}
    function boll(c,p=20,m=2){const s=c.slice(-p);const sm=s.reduce((a,b)=>a+b,0)/s.length;const sd=Math.sqrt(s.reduce((a,b)=>a+Math.pow(b-sm,2),0)/s.length);return{u:sm+m*sd,mid:sm,l:sm-m*sd,bw:(m*2*sd)/sm*100}}
    function vwap(cd){let vp=0,v=0;cd.forEach(c=>{vp+=((c.high+c.low+c.close)/3)*c.volume;v+=c.volume});return v>0?vp/v:0}

    function calcATR(candles, period=14){
        if(candles.length<period+1)return candles[candles.length-1]?.close*0.03||0.0001;
        let sum=0;
        for(let i=candles.length-period;i<candles.length;i++){
            const tr=Math.max(candles[i].high-candles[i].low,Math.abs(candles[i].high-candles[i-1].close),Math.abs(candles[i].low-candles[i-1].close));
            sum+=tr;
        }
        return sum/period;
    }
    function calcSR(candles, levels=3){
        const recent=candles.slice(-40);
        const lows=recent.map(c=>c.low).sort((a,b)=>a-b);
        const highs=recent.map(c=>c.high).sort((a,b)=>b-a);
        const supports=[],resistances=[];
        for(let i=0;i<lows.length-1&&supports.length<levels;i++){
            const cluster=lows.filter(l=>Math.abs(l-lows[i])/lows[i]<0.01);
            if(cluster.length>=2&&!supports.find(s=>Math.abs(s-lows[i])/lows[i]<0.015)) supports.push(lows[i]);
        }
        for(let i=0;i<highs.length-1&&resistances.length<levels;i++){
            const cluster=highs.filter(h=>Math.abs(h-highs[i])/highs[i]<0.01);
            if(cluster.length>=2&&!resistances.find(r=>Math.abs(r-highs[i])/highs[i]<0.015)) resistances.push(highs[i]);
        }
        return {supports:supports.sort((a,b)=>b-a),resistances:resistances.sort((a,b)=>a-b)};
    }
    
    function calcTradeLevels(candles, signal, security){
        const price=candles[candles.length-1].close, atr=calcATR(candles,14), sr=calcSR(candles);
        const isBuy=signal.includes('BUY');
        let entry=price,sl,tp1,tp2,tp3,risk,reward,rr;
        
        if(isBuy){
            const slByATR=entry-atr*1.5, slBySupport=sr.supports.length>0?sr.supports[0]*0.998:null;
            sl=(slBySupport&&slBySupport>slByATR)?slBySupport:slByATR;
            if((entry-sl)/entry<0.01)sl=entry*0.99;
            risk=entry-sl;
            tp1=entry+risk*1.5; tp2=entry+risk*2.5; tp3=entry+risk*4;
            if(sr.resistances.length>0){
                const r1=sr.resistances[0]; if(tp1>r1*0.99)tp1=r1*0.99;
                if(sr.resistances.length>1){const r2=sr.resistances[1]; if(tp2>r2*0.99)tp2=r2*0.99;}
            }
            reward=tp2-entry;
        }else{
            const slByATR=entry+atr*1.5, slByResist=sr.resistances.length>0?sr.resistances[0]*1.002:null;
            sl=(slByResist&&slByResist<slByATR)?slByResist:slByATR;
            if((sl-entry)/entry<0.01)sl=entry*1.01;
            risk=sl-entry;
            tp1=entry-risk*1.5; tp2=entry-risk*2.5; tp3=entry-risk*4;
            if(sr.supports.length>0){
                const s1=sr.supports[0]; if(tp1<s1*1.01)tp1=s1*1.01;
                if(sr.supports.length>1){const s2=sr.supports[1]; if(tp2<s2*1.01)tp2=s2*1.01;}
            }
            reward=entry-tp2;
        }
        rr=risk>0?reward/risk:0;
        return {entry,sl,tp1,tp2,tp3,risk,reward,rr,slPct:((sl-entry)/entry)*100,tp1Pct:((tp1-entry)/entry)*100,tp2Pct:((tp2-entry)/entry)*100,tp3Pct:((tp3-entry)/entry)*100,atr,sr,isBuy};
    }

    function genSignal(candles,sec){
        const cl=candles.map(c=>c.close),vl=candles.map(c=>c.volume);
        const r=rsi(cl),m=macd(cl),e9=ema(cl,9),e21=ema(cl,21),bb=boll(cl),vw=vwap(candles);
        const n=cl.length-1,va=vl.slice(-20).reduce((a,b)=>a+b,0)/20,vr=vl[n]/va;
        let sig='HOLD',str=0,reasons=[];

        if(sec.honeypot)return{signal:'STRONG_SELL',strength:-5,reasons:['HONEYPOT — JANGAN BELI'],rsi:r,macd:m,ema9:e9[n],ema21:e21[n],bb,vwap:vw,volRatio:vr};
        if(!sec.canTrade)return{signal:'STRONG_SELL',strength:-4,reasons:['RISK TERLALU TINGGI','Score: '+sec.score+'/100'],rsi:r,macd:m,ema9:e9[n],ema21:e21[n],bb,vwap:vw,volRatio:vr};

        if(r<25){str+=3;reasons.push('RSI OVERSOLD EXTREME (<25)')}
        else if(r<35){str+=2;reasons.push('RSI OVERSOLD (<35)')}
        else if(r>75){str-=3;reasons.push('RSI OVERBOUGHT (>75)')}
        else if(r>65){str-=2;reasons.push('RSI OVERBOUGHT (>65)')}

        if(e9[n]>e21[n]&&e9[n-1]<=e21[n-1]){str+=3;reasons.push('EMA 9/21 GOLDEN CROSS')}
        else if(e9[n]<e21[n]&&e9[n-1]>=e21[n-1]){str-=3;reasons.push('EMA 9/21 DEATH CROSS')}
        else if(e9[n]>e21[n]){str+=1;reasons.push('EMA BULLISH')}

        if(m.h>0&&m.m>m.s){str+=2;reasons.push('MACD BULLISH')} else if(m.h<0){str-=2;reasons.push('MACD BEARISH')}
        if(cl[n]<=bb.l){str+=2;reasons.push('BOUNCE LOWER BB')} else if(cl[n]>=bb.u){str-=2;reasons.push('REJECT UPPER BB')}
        if(cl[n]>vw*1.02){str+=1;reasons.push('ABOVE VWAP')}else if(cl[n]<vw*0.98){str-=1;reasons.push('BELOW VWAP')}
        if(vr>3){str=Math.round(str*1.5);reasons.push('VOLUME SURGE '+vr.toFixed(1)+'x')}

        if(str>=5)sig='STRONG_BUY';else if(str>=3)sig='BUY';else if(str<=-5)sig='STRONG_SELL';else if(str<=-3)sig='SELL';
        if(sec.sellTax>5&&sig.includes('BUY')){str=Math.max(0,str-Math.floor(sec.sellTax/3));reasons.push('WARN: SELL TAX '+sec.sellTax+'%');if(str<3)sig='HOLD'}

        return{signal:sig,strength:str,reasons,rsi:r,macd:m,ema9:e9[n],ema21:e21[n],bb,vwap:vw,volRatio:vr};
    }

            const tl=calcTradeLevels(cd,sig.signal,sec);
            return{...c,price:cp,change30m:((cp-pp)/pp)*100,marketCap:cp*(Math.random()*5e8+1e7),
                candles:cd,security:sec,signal:sig.signal,signalStrength:sig.strength,signalReasons:sig.reasons,
                rsi:sig.rsi,macdData:sig.macd,ema9:sig.ema9,ema21:sig.ema21,bb:sig.bb,vwap:sig.vwap,volRatio:sig.volRatio,
                volume24h:cd.slice(-48).reduce((a,c)=>a+c.volume,0),tradeLevels:tl,lastUpdate:Date.now(),apiSrc:false};
        });
    }

    async function fetchAPI(){
        // Diperbarui agar path api lebih universal dan less error (menghindari 404 dari type=memecoin jika tak ada di backend)
        const list = await api('GET','/tokens?chain=solana&limit=50');
        
        if(list && Array.isArray(list) && list.length>0){
            document.getElementById('srcBadge').style.cssText='background:rgba(0,232,123,.1);color:#00e87b;border:1px solid rgba(0,232,123,.2)';

            document.getElementById('apiStatus').innerHTML='<div class="w-2 h-2 rounded-full bg-accent pulse-dot"></div><span class="text-[11px] font-mono text-accent">ONLINE</span>';
            list.forEach((t,i)=>{if(i<tokens.length){if(t.price)tokens[i].price=parseFloat(t.price);tokens[i].apiSrc=true}});
        }else{
            document.getElementById('apiStatus').innerHTML='<div class="w-2 h-2 rounded-full bg-warn pulse-dot"></div><span class="text-[11px] font-mono text-warn">FALLBACK</span>';
        }
        
        if(CFG.wallet){
            const b = await api('GET',`/wallet/${CFG.wallet}/balance?network=solana`);
            if(b)document.getElementById('solBal').textContent=parseFloat(b.solana?.sol||b.SOL||b.balance||0).toFixed(4)+' SOL';
        }
    }

    function simPrice(){
        tokens.forEach(t=>{
            const v=.003,ch=(Math.random()-.48)*v*t.price;
            t.price=Math.max(t.price*.5,t.price+ch);
            const lc=t.candles[t.candles.length-1];
            lc.close=t.price;lc.high=Math.max(lc.high,t.price);lc.low=Math.min(lc.low,t.price);
            t.change30m=((t.price-t.candles[t.candles.length-2].close)/t.candles[t.candles.length-2].close)*100;
        });
        renderTable();
        if(selToken)renderDetail();
    }

    function toast(msg,type='info'){
        const c=document.getElementById('toastContainer');
        const cl={success:'border-accent bg-accent/10 text-accent',error:'border-danger bg-danger/10 text-danger',warn:'border-warn bg-warn/10 text-warn',info:'border-muted bg-card text-txt'};
        const ic={success:'fa-circle-check',error:'fa-circle-xmark',warn:'fa-triangle-exclamation',info:'fa-circle-info'};
        const t=document.createElement('div');
        t.className=`toast border rounded-lg px-4 py-3 text-[12px] font-mono flex items-center gap-2 ${cl[type]}`;
        t.style.cssText='min-width:280px;max-width:420px;backdrop-filter:blur(10px)';
        t.innerHTML=`<i class="fa-solid ${ic[type]}"></i><span class="flex-1">${msg}</span>`;
        c.appendChild(t);
        setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300)},4000);
    }

    document.getElementById('fSig').addEventListener('change',renderTable);
    document.getElementById('fRisk').addEventListener('change',renderTable);
    document.getElementById('fSort').addEventListener('change',renderTable);

    function init(){
        initData();renderTable();
        setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB'),1000);
        setInterval(simPrice,2500);
        fetchAPI();setInterval(fetchAPI,30000);
        const fb=tokens.find(t=>t.signal.includes('BUY')&&t.security.score>=70);
        if(fb)sel(fb.s);
        toast('Dashboard aktif — 12-Check Anti-Rug Engine ON','success');
    }
    
    init();
    </script>
</body>
</html>
